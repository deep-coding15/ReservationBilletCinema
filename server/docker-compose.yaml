services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: cinema_reservation
      POSTGRES_PASSWORD: "9L14kI7rDaBIi0Ma-CZ_4oG1VQJmtNnk"
    volumes:
      - cinema_reservation_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "Hr4pdeXsWvUTUXEeWfC1EJciAohwT52z"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: cinema_reservation_test
      POSTGRES_PASSWORD: "740vvUFaWLHOrFPN8Quz4xoLNuRakn4H"
    volumes:
      - cinema_reservation_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "BYzxY4opaOfVLWzIFKtWpxsUkntIieN-"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  cinema_reservation_data:
  cinema_reservation_test_data:
